<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCredit Pro v9 - Admin Total</title>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --accent: #58a6ff;
            --neon: #39d353; --border: #30363d; --text: #c9d1d9; --danger: #f85149; --warning: #f1e05a;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; padding-bottom: 80px; }
        .container { max-width: 900px; margin: auto; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 15px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #0d1117; padding: 15px; border-radius: 10px; border-left: 4px solid var(--accent); text-align: center; }
        .stat-box h4 { margin: 0; font-size: 12px; color: var(--text); opacity: 0.7; }
        .stat-box p { margin: 5px 0 0; font-size: 18px; font-weight: bold; color: var(--neon); }
        button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-main { background: var(--neon); color: #0d1117; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 100; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .tab-btn { background: #30363d; color: white; min-width: 90px; font-size: 0.7rem; padding: 10px 5px; }
        .tab-btn.active { background: var(--accent); }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 10px 5px; border-bottom: 1px solid var(--border); text-align: left; }
        select, input, textarea { width: 100%; padding: 10px; margin-top: 5px; background: #0d1117; border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 900; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 400px; background: var(--card); border: 1px solid var(--accent); z-index: 1000; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>

<div id="login-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:5000; display:flex; justify-content:center; align-items:center;">
    <div class="card" style="width:280px; text-align:center;">
        <h2 style="color:var(--accent)">SmartCredit Pro</h2>
        <input type="email" id="auth-email" placeholder="Correo">
        <input type="password" id="auth-pass" placeholder="Password">
        <button onclick="login()" class="btn-main" style="margin-top:10px;">ENTRAR</button>
    </div>
</div>

<div class="container" id="app-content" style="display:none;">
    <div id="nav-admin" class="tabs" style="display:none;">
        <button class="tab-btn active" onclick="nav('cobros')">PRÉSTAMOS</button>
        <button class="tab-btn" onclick="nav('usuarios')">USUARIOS</button>
        <button class="tab-btn" onclick="nav('stats')">MÉTRICAS</button>
        <button class="tab-btn" onclick="nav('reportes')">LOGS</button>
        <button onclick="salir()" style="background:var(--danger); min-width:40px; color:white;">X</button>
    </div>

    <div id="nav-cobrador" class="tabs" style="display:none;">
        <div style="color:var(--accent); font-weight:bold; padding:10px;">MODO COBRADOR</div>
        <button onclick="salir()" style="background:var(--danger); width:60px; margin-left:auto; color:white;">SALIR</button>
    </div>

    <div id="sec-usuarios" style="display:none;">
        <div class="card">
            <h3>Crear Nuevo Cobrador</h3>
            <input type="text" id="u-nombre" placeholder="Nombre completo">
            <input type="email" id="u-email" placeholder="Correo (ej: pablo@gmail.com)">
            <p style="font-size: 10px; color: var(--warning);">*Nota: Los administradores deben empezar con la palabra 'admin'</p>
            <button onclick="crearUsuario()" class="btn-main" style="margin-top:10px;">AGREGAR COBRADOR</button>
        </div>
        <div class="card">
            <h3>Lista de Personal</h3>
            <table id="userTable"><thead><tr><th>Nombre</th><th>Correo</th></tr></thead><tbody></tbody></table>
        </div>
    </div>

    <div id="sec-cobros" style="display:none;">
        <div class="card">
            <h3>Registrar Préstamo</h3>
            <input type="text" id="p-nombre" placeholder="Nombre Cliente">
            <input type="tel" id="p-tel" placeholder="WhatsApp">
            <input type="number" id="p-monto" placeholder="Monto">
            <input type="number" id="p-cuotas" placeholder="Cuotas">
            <select id="p-frecuencia" style="margin-top:10px;">
                <option value="1">Diario</option>
                <option value="7">Semanal</option>
                <option value="15">Quincenal</option>
                <option value="30">Mensual</option>
            </select>
            <select id="p-cobrador" style="margin-top:10px;"><option value="">Asignar Cobrador...</option></select>
            <button onclick="crearPrestamo()" class="btn-main" style="margin-top:10px;">CREAR PRÉSTAMO</button>
        </div>
        <div class="card"><table id="mainTable"><thead><tr><th>Cliente</th><th>Monto</th><th>Cobrador</th></tr></thead><tbody></tbody></table></div>
    </div>

    <div id="sec-stats" style="display:none;">
        <div class="stat-grid">
            <div class="stat-box"><h4>TOTAL CARTERA</h4><p id="st-capital">$0</p></div>
            <div class="stat-box"><h4>COBRADO HOY</h4><p id="st-hoy">$0</p></div>
        </div>
    </div>

    <div id="sec-asistencia" style="display:none;">
        <div class="card" style="text-align:center;">
            <button onclick="marcarAsistencia('entrada')" class="btn-main" style="height:60px;">INICIAR RUTA</button>
        </div>
    </div>

    <div id="sec-ruta" style="display:none;"><div id="lista-ruta"></div></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBG8gNLEehKd_UPay-rTb5nVr2Vw3WfiHs", authDomain: "pres-9e035.firebaseapp.com", projectId: "pres-9e035", storageBucket: "pres-9e035.firebasestorage.app", messagingSenderId: "561822383782", appId: "1:561822383782:web:60ea314bd3dc7a28333e67" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let DATA = { cartera: [], pagos: [], personal: {} };
    let USER_MAIL = "";
    let ES_ADMIN = false;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            USER_MAIL = user.email.toLowerCase();
            ES_ADMIN = USER_MAIL.startsWith("admin");
            await loadData();
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            setupUI();
        } else {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app-content').style.display = 'none';
        }
    });

    async function loadData() {
        const s = await getDoc(doc(db, "empresa", "global_data"));
        if(s.exists()) DATA = s.data();
        renderMainTable();
        renderUserTable();
    }

    async function syncData() {
        await setDoc(doc(db, "empresa", "global_data"), DATA);
    }

    function setupUI() {
        if(ES_ADMIN) {
            document.getElementById('nav-admin').style.display = 'flex';
            document.getElementById('nav-cobrador').style.display = 'none';
            const sel = document.getElementById('p-cobrador');
            sel.innerHTML = '<option value="">Asignar Cobrador...</option>';
            for(let m in DATA.personal) sel.innerHTML += `<option value="${m}">${DATA.personal[m].nombre || m}</option>`;
            nav('cobros');
        } else {
            document.getElementById('nav-admin').style.display = 'none';
            document.getElementById('nav-cobrador').style.display = 'flex';
            nav('asistencia');
        }
    }

    window.nav = (s) => {
        ['cobros', 'usuarios', 'stats', 'reportes', 'asistencia', 'ruta'].forEach(x => {
            const el = document.getElementById('sec-'+x);
            if(el) el.style.display = 'none';
        });
        document.getElementById('sec-'+s).style.display = 'block';
        if(s === 'stats') renderStats();
    };

    // --- GESTIÓN DE USUARIOS (ADMIN) ---
    window.crearUsuario = async () => {
        const mail = document.getElementById('u-email').value.toLowerCase();
        const nom = document.getElementById('u-nombre').value;
        if(!mail || !nom) return alert("Completa los datos");
        
        DATA.personal[mail] = { nombre: nom, fecha: "", entrada: "", salida: "" };
        await syncData();
        renderUserTable();
        setupUI(); // Actualiza el select de cobradores
        alert("Usuario agregado al sistema");
    };

    function renderUserTable() {
        const tb = document.querySelector('#userTable tbody');
        if(!tb) return;
        tb.innerHTML = "";
        for(let m in DATA.personal) {
            tb.innerHTML += `<tr><td>${DATA.personal[m].nombre}</td><td>${m}</td></tr>`;
        }
    }

    // --- PRÉSTAMOS ---
    window.crearPrestamo = async () => {
        try {
            const m = parseFloat(document.getElementById('p-monto').value);
            const cu = parseInt(document.getElementById('p-cuotas').value);
            const frec = parseInt(document.getElementById('p-frecuencia').value);
            const cob = document.getElementById('p-cobrador').value;

            if(!m || !cu || !cob) return alert("Llena todos los campos");

            let planPagos = [];
            for(let i=1; i<=cu; i++) {
                let fVence = new Date();
                fVence.setDate(fVence.getDate() + (i * frec));
                planPagos.push({ id: i, monto: (m/cu).toFixed(2), pagado: false, vence: fVence.toLocaleDateString() });
            }

            DATA.cartera.push({
                id: Date.now(),
                nombre: document.getElementById('p-nombre').value,
                monto: m,
                cobrador: cob,
                plan: planPagos
            });

            await syncData();
            renderMainTable();
            alert("Préstamo creado con éxito");
        } catch (e) {
            console.error(e);
            alert("Error al crear: " + e.message);
        }
    };

    function renderMainTable() {
        const tb = document.querySelector('#mainTable tbody');
        if(!tb) return;
        tb.innerHTML = "";
        DATA.cartera.forEach(p => {
            tb.innerHTML += `<tr><td>${p.nombre}</td><td>$${p.monto}</td><td>${p.cobrador}</td></tr>`;
        });
    }

    function renderStats() {
        document.getElementById('st-capital').innerText = "$" + DATA.cartera.reduce((a,b) => a + b.monto, 0);
        const hoy = new Date().toLocaleDateString();
        const totalHoy = DATA.pagos.filter(p => p.fecha === hoy).reduce((a,b) => a + parseFloat(b.monto), 0);
        document.getElementById('st-hoy').innerText = "$" + totalHoy;
    }

    window.login = async () => {
        try { await signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-pass').value); }
        catch(e) { alert("Error de acceso"); }
    };
    window.salir = () => signOut(auth);
</script>
</body>
</html>
